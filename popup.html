<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 15px; font-family: sans-serif; }
    h3 { font-size: 16px; margin-top: 0; color: #2c3e50; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 4px; }
    .info { font-size: 11px; color: #7f8c8d; margin-top: 10px; }
    img { width: 100%; margin-top: 10px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h3>Auto Refresh Setup</h3>
  <label>URL Target:</label>
  <input type="text" id="webUrl" placeholder="https://contoh-web.com">
  <button id="saveBtn">Simpan & Aktifkan</button>
  
  <p class="info">Target tombol yang diklik:</p>
  <div style="background:#eee; padding:5px; text-align:center; font-weight:bold; border:1px solid #ccc; color:#333;">
    🔄 Refresh
  </div>
  <p class="info" style="font-style: italic;">Ekstensi akan mencari tombol dengan teks "Refresh".</p>

  <script src="popup.js"></script>
</body>
</html>
